<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KM DRIVEN | AI Mileage Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="visual-bg">
        <div class="noise"></div>
        <div class="blob-c">
            <div class="shape-blob one"></div>
            <div class="shape-blob two"></div>
            <div class="shape-blob three"></div>
        </div>
        <div class="grid-overlay"></div>
    </div>

    <div class="container">
        <header>
            <div class="status-pill"><span class="dot"></span> Neural Engine Online</div>
            <h1 class="logo">KM <span>DRIVEN</span></h1>
            <p class="tagline">Next-gen fuel efficiency analytics powered by Machine Learning.</p>
        </header>

        <main class="main-card">
            <div class="card-glow"></div>
            <form id="predictionForm" class="content-wrapper">
                <div class="input-grid">
                    <div class="input-box">
                        <label><i class="fas fa-microchip"></i> Engine CC</label>
                        <input type="number" id="cc" placeholder="0000" required>
                    </div>
                    <div class="input-box">
                        <label><i class="fas fa-piston"></i> Cylinders</label>
                        <input type="number" id="cylinders" placeholder="0" required>
                    </div>
                    <div class="input-box">
                        <label><i class="fas fa-bolt"></i> Horsepower</label>
                        <input type="number" id="hp" placeholder="000" required>
                    </div>
                    <div class="input-box">
                        <label><i class="fas fa-weight-hanging"></i> Weight (KG)</label>
                        <input type="number" id="weight" placeholder="0000" required>
                    </div>
                    <div class="input-box">
                        <label><i class="fas fa-arrows-left-right"></i> Wheelbase</label>
                        <input type="number" id="wheelbase" placeholder="00" required>
                    </div>
                    <div class="input-box">
                        <label><i class="fas fa-ruler-horizontal"></i> Length</label>
                        <input type="number" id="length" placeholder="000" required>
                    </div>
                </div>

                <button type="submit" id="predictBtn" class="glow-btn">
                    <span class="btn-content">
                        <span class="btn-text">INITIALIZE ANALYSIS</span>
                        <i class="fas fa-atom btn-icon"></i>
                    </span>
                    <div class="loader"></div>
                </button>
            </form>

            <div id="resultCard" class="result-section hidden">
                <div class="divider"></div>
                <div class="result-display">
                    <div class="result-meta">
                        <span class="label">PREDICTED YIELD</span>
                    </div>
                    <div class="value-container">
                        <span id="mileageNum" class="neon-text">00.0</span>
                        <span class="unit">KM/L</span>
                    </div>
                    <p class="disclaimer">Calculation based on ISO-standard driving cycles</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Smooth reveal animations
        gsap.from(".main-card", { scale: 0.9, opacity: 0, duration: 1.2, ease: "expo.out" });
        gsap.from(".input-box", { y: 30, opacity: 0, stagger: 0.08, delay: 0.5, ease: "power4.out" });
        gsap.from(".logo", { y: -20, opacity: 0, duration: 1, ease: "power3.out" });

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('predictBtn');
            const resultCard = document.getElementById('resultCard');
            
            btn.classList.add('loading');
            
            // Collect data (Same as original)
            const formData = {
                cc: document.getElementById('cc').value,
                cylinders: document.getElementById('cylinders').value,
                hp: document.getElementById('hp').value,
                weight: document.getElementById('weight').value,
                wheelbase: document.getElementById('wheelbase').value,
                length: document.getElementById('length').value
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                const result = await response.json();
                
                btn.classList.remove('loading');
                
                if(result.mileage) {
                    resultCard.classList.remove('hidden');
                    gsap.fromTo("#resultCard", { clipPath: "inset(100% 0 0 0)" }, { clipPath: "inset(0% 0 0 0)", duration: 0.8, ease: "power4.out" });
                    
                    let obj = { val: 0 };
                    gsap.to(obj, {
                        val: result.mileage,
                        duration: 2.5,
                        ease: "expo.out",
                        onUpdate: () => {
                            document.getElementById('mileageNum').innerText = obj.val.toFixed(2);
                        }
                    });
                }
            } catch (err) {
                console.error(err);
                btn.classList.remove('loading');
                alert("Deep Link Error: AI Offline");
            }
        });
    </script>
</body>
</html>
