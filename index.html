<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelX Pro | AI Mileage Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="scanlines"></div>
    <div class="background-vignette"></div>

    <div class="container">
        <header>
            <div class="telemetry-bar">
                <span>SYSTEM: STABLE</span>
                <span>AI_CORE: ACTIVE</span>
                <span>V8.4.2</span>
            </div>
            <h1 class="logo">FUELX <span>PRO</span></h1>
            <p>ADVANCED VEHICLE ANALYTICS ENGINE</p>
        </header>

        <main class="diagnostic-frame">
            <div class="corner tl"></div><div class="corner tr"></div>
            <div class="corner bl"></div><div class="corner br"></div>

            <form id="predictionForm">
                <div class="input-grid">
                    <div class="field">
                        <label>ENGINE DISPLACEMENT</label>
                        <div class="input-wrapper">
                            <input type="number" id="cc" placeholder="1197" required>
                            <span class="unit-tag">CC</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>CYLINDER COUNT</label>
                        <div class="input-wrapper">
                            <input type="number" id="cylinders" placeholder="4" required>
                            <span class="unit-tag">CYL</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>PEAK POWER</label>
                        <div class="input-wrapper">
                            <input type="number" id="hp" placeholder="88" required>
                            <span class="unit-tag">HP</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>CURB WEIGHT</label>
                        <div class="input-wrapper">
                            <input type="number" id="weight" placeholder="1050" required>
                            <span class="unit-tag">KG</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>WHEELBASE</label>
                        <div class="input-wrapper">
                            <input type="number" id="wheelbase" placeholder="96" required>
                            <span class="unit-tag">IN</span>
                        </div>
                    </div>
                    <div class="field">
                        <label>TOTAL LENGTH</label>
                        <div class="input-wrapper">
                            <input type="number" id="length" placeholder="150" required>
                            <span class="unit-tag">IN</span>
                        </div>
                    </div>
                </div>

                <button type="submit" id="predictBtn">
                    <span class="btn-text">INITIALIZE DIAGNOSTIC</span>
                    <div class="loader"></div>
                    <div class="btn-glitch"></div>
                </button>
            </form>

            <div id="resultCard" class="result-card hidden">
                <div class="result-header">
                    <span class="status-indicator">ANALYSIS COMPLETE</span>
                    <span class="conf-level">94.2% CONFIDENCE</span>
                </div>
                <div class="result-body">
                    <div class="value-display">
                        <span id="mileageNum">00.0</span>
                        <small>KM/L</small>
                    </div>
                </div>
                <div class="result-footer">
                    INDIAN STANDARD MILEAGE PREDICTION [EST]
                </div>
            </div>
        </main>
    </div>

    <script>
        // Logic remains identical to original for backend compatibility
        gsap.from(".diagnostic-frame", { scale: 0.95, opacity: 0, duration: 1, ease: "power4.out" });
        gsap.from(".field", { y: 20, opacity: 0, stagger: 0.05, delay: 0.3 });

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('predictBtn');
            const resultCard = document.getElementById('resultCard');
            
            btn.classList.add('loading');
            
            const formData = {
                cc: document.getElementById('cc').value,
                cylinders: document.getElementById('cylinders').value,
                hp: document.getElementById('hp').value,
                weight: document.getElementById('weight').value,
                wheelbase: document.getElementById('wheelbase').value,
                length: document.getElementById('length').value
            };

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                const result = await response.json();
                
                btn.classList.remove('loading');
                
                if(result.mileage) {
                    resultCard.classList.remove('hidden');
                    gsap.fromTo("#resultCard", { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6 });
                    
                    let obj = { val: 0 };
                    gsap.to(obj, {
                        val: result.mileage,
                        duration: 2,
                        ease: "expo.out",
                        onUpdate: () => {
                            document.getElementById('mileageNum').innerText = obj.val.toFixed(2);
                        }
                    });
                }
            } catch (err) {
                console.error(err);
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
