<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMDriven  | AI Mileage Predications</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="blob-c">
        <div class="shape-blob one"></div>
        <div class="shape-blob two"></div>
        <div class="shape-blob three"></div>
    </div>

    <div class="container">
        <header>
            <div class="badge">Engineered for Precision</div>
            <div class="logo">FuelX <span>Pro</span></div>
            <p>Predicting efficiency with high-fidelity Real World Data</p>
        </header>

        <main class="glass-container">
            <form id="predictionForm">
                <div class="input-section">
                    <div class="input-group">
                        <label><i class="fas fa-microchip"></i> Engine Capacity (CC)</label>
                        <input type="number" id="cc" placeholder="e.g. 1197" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-piston"></i> Cylinders</label>
                        <input type="number" id="cylinders" placeholder="e.g. 4" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-bolt"></i> Horsepower</label>
                        <input type="number" id="hp" placeholder="e.g. 88" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-weight-hanging"></i> Weight (KG)</label>
                        <input type="number" id="weight" placeholder="e.g. 1050" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-arrows-left-right"></i> Wheelbase (in)</label>
                        <input type="number" id="wheelbase" placeholder="e.g. 96" required>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-ruler-horizontal"></i> Length (in)</label>
                        <input type="number" id="length" placeholder="e.g. 150" required>
                    </div>
                </div>

                <button type="submit" id="predictBtn">
                    <span class="btn-text">Run Diagnostic <i class="fas fa-chevron-right"></i></span>
                    <div class="loader"></div>
                </button>
            </form>

            <div id="resultCard" class="result-card hidden">
                <div class="result-header">
                    <div class="result-label">Predicted Standard Mileage</div>
                </div>
                <div class="result-value"><span id="mileageNum">00.0</span> <small>km/l</small></div>
                <div class="result-footer">Based on Real World Data</div>
            </div>
        </main>
    </div>

    <script>
        // Entry Animations
        gsap.from(".glass-container", {opacity: 0, y: 30, duration: 1.2, ease: "expo.out"});
        gsap.from(".input-group", {opacity: 0, y: 20, stagger: 0.1, delay: 0.4, ease: "power2.out"});
        gsap.from(".logo", {scale: 0.8, opacity: 0, duration: 1, ease: "back.out(1.7)"});

        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('predictBtn');
            const resultCard = document.getElementById('resultCard');
            
            btn.classList.add('loading');
            
            const formData = {
                cc: document.getElementById('cc').value,
                cylinders: document.getElementById('cylinders').value,
                hp: document.getElementById('hp').value,
                weight: document.getElementById('weight').value,
                wheelbase: document.getElementById('wheelbase').value,
                length: document.getElementById('length').value
            };

            try {
                // Mocking the Fetch for demonstration, keep your original /predict endpoint
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                const result = await response.json();
                
                btn.classList.remove('loading');
                
                if(result.mileage) {
                    resultCard.classList.remove('hidden');
                    gsap.fromTo("#resultCard", {y: 20, opacity: 0}, {y: 0, opacity: 1, duration: 0.6, ease: "power3.out"});
                    
                    let obj = { val: 0 };
                    gsap.to(obj, {
                        val: result.mileage,
                        duration: 2,
                        ease: "expo.out",
                        onUpdate: () => {
                            document.getElementById('mileageNum').innerText = obj.val.toFixed(2);
                        }
                    });
                }
            } catch (err) {
                console.error(err);
                btn.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
