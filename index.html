<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FuelX Pro | AI Mileage Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="grain-overlay"></div>
    
    <div class="blob-c">
        <div class="shape-blob one"></div>
        <div class="shape-blob two"></div>
    </div>

    <div class="dashboard">
        <header class="hero-section">
            <h1 class="logo">FUEL<span>X</span> PRO</h1>
            <div class="status-tag"><span class="pulse"></span> System Live: Neural Engine v4.2</div>
        </header>

        <main class="bento-grid">
            <section class="glass-card input-module">
                <h3>Vehicle Parameters</h3>
                <form id="predictionForm">
                    <div class="grid-inputs">
                        <div class="input-item">
                            <label>Engine Capacity (<span>1200</span> CC)</label>
                            <input type="range" id="cc" min="600" max="6000" value="1200">
                        </div>
                        <div class="input-item">
                            <label>Cylinders (<span>4</span>)</label>
                            <input type="range" id="cylinders" min="2" max="12" value="4">
                        </div>
                        <div class="input-item">
                            <label>Horsepower (<span>100</span> HP)</label>
                            <input type="range" id="hp" min="40" max="1000" value="100">
                        </div>
                        <div class="input-item">
                            <label>Weight (<span>1100</span> KG)</label>
                            <input type="range" id="weight" min="500" max="3500" value="1100">
                        </div>
                    </div>
                    <button type="submit" id="predictBtn">
                        <span class="btn-text">RUN INFERENCE</span>
                        <div class="loader"></div>
                    </button>
                </form>
            </section>

            <section class="glass-card stats-module">
                <div class="stat-header">Model Metrics</div>
                <div class="mini-chart">
                    <div class="bar" style="height: 80%"></div>
                    <div class="bar" style="height: 60%"></div>
                    <div class="bar" style="height: 95%"></div>
                    <div class="bar" style="height: 70%"></div>
                </div>
                <p>Accuracy Score: <strong>94.2%</strong></p>
            </section>

            <section id="resultCard" class="glass-card result-module empty">
                <div class="res-content">
                    <span class="label">ESTIMATED EFFICIENCY</span>
                    <div class="value"><span id="mileageNum">--.-</span> <small>km/l</small></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Update range labels dynamically
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.oninput = function() {
                this.previousElementSibling.querySelector('span').innerText = this.value;
            }
        });

        // Animations
        gsap.from(".glass-card", { opacity: 0, scale: 0.9, duration: 0.8, stagger: 0.2, ease: "expo.out" });
    </script>
</body>
</html>
